<svg width="1060" viewBox="0 0 980 362" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="490" y1="14" x2="490" y2="338" stroke="#cccccc" stroke-width="0.6"/>

  <!-- TODAY (LEFT) -->
  <text x="245" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#111111">Today</text>
  <line x1="20" y1="40" x2="470" y2="40" stroke="#cccccc" stroke-width="0.5"/>

  <!-- 1 central controller -->
  <rect x="145" y="50" width="200" height="48" rx="10" fill="#8B3A2A" stroke="#c0614a" stroke-width="0.8"/>
  <text x="245" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#f4c8bc" dominant-baseline="central">1 central controller</text>

  <!-- Arrows to all 6 actors. Centers: 53,127,201,275 | gap | 359,433 -->
  <line x1="245" y1="98" x2="53"  y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="245" y1="98" x2="127" y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="245" y1="98" x2="201" y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="245" y1="98" x2="275" y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="245" y1="98" x2="359" y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="245" y1="98" x2="433" y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>

  <!-- ALL 6 ACTORS — same physical setup as INTER.act, just no intelligence.
       Box width 62 matching right side. No brain labels. No peer arrows.
       Arms: x=22,96,170,244 | 22px gap | Assets: x=328,402 -->

  <!-- Arm 1 -->
  <rect x="22"  y="132" width="62" height="42" rx="8" fill="#f0f0f0" stroke="#bbbbbb" stroke-width="0.5"/>
  <text x="53"  y="153" text-anchor="middle" font-size="12" fill="#111111" dominant-baseline="central">Arm 1</text>

  <!-- Arm 2 -->
  <rect x="96"  y="132" width="62" height="42" rx="8" fill="#f0f0f0" stroke="#bbbbbb" stroke-width="0.5"/>
  <text x="127" y="153" text-anchor="middle" font-size="12" fill="#111111" dominant-baseline="central">Arm 2</text>

  <!-- Arm 3 -->
  <rect x="170" y="132" width="62" height="42" rx="8" fill="#f0f0f0" stroke="#bbbbbb" stroke-width="0.5"/>
  <text x="201" y="153" text-anchor="middle" font-size="12" fill="#111111" dominant-baseline="central">Arm 3</text>

  <!-- Arm 4 -->
  <rect x="244" y="132" width="62" height="42" rx="8" fill="#f0f0f0" stroke="#bbbbbb" stroke-width="0.5"/>
  <text x="275" y="153" text-anchor="middle" font-size="12" fill="#111111" dominant-baseline="central">Arm 4</text>

  <!-- Shuttle A — dumb peripheral, same dark style, 22px gap after Arm 4 (306→328) -->
  <rect x="328" y="132" width="62" height="42" rx="8" fill="#f0f0f0" stroke="#bbbbbb" stroke-width="0.5"/>
  <text x="359" y="153" text-anchor="middle" font-size="12" fill="#111111" dominant-baseline="central">Shuttle A</text>

  <!-- Belt 1 — dumb peripheral -->
  <rect x="402" y="132" width="62" height="42" rx="8" fill="#f0f0f0" stroke="#bbbbbb" stroke-width="0.5"/>
  <text x="433" y="153" text-anchor="middle" font-size="12" fill="#111111" dominant-baseline="central">Belt 1</text>

  <!-- No peer arrows — actors cannot communicate -->

  <!-- Type labels matching right side -->
  <text x="158" y="188" text-anchor="middle" font-size="10" fill="#111111" font-style="italic">arms</text>
  <text x="395" y="188" text-anchor="middle" font-size="10" fill="#111111" font-style="italic">assets (vehicle · conveyor)</text>

  <!-- Description -->
  <text x="245" y="206" text-anchor="middle" font-size="12" fill="#111111">no actor has intelligence · no actor can communicate</text>

  <!-- Summary box -->
  <rect x="22" y="222" width="446" height="106" rx="8" fill="none" stroke="#aaaaaa" stroke-width="0.8"/>
  <text x="245" y="250" text-anchor="middle" font-size="12" fill="#111111">All decisions bottleneck through one central controller</text>
  <text x="245" y="270" text-anchor="middle" font-size="12" fill="#111111">No actor can communicate with any other</text>
  <text x="245" y="290" text-anchor="middle" font-size="12" fill="#111111">No actor can act without instruction</text>
  <text x="245" y="310" text-anchor="middle" font-size="12" fill="#111111">Assets are dumb peripherals - no dedicated intelligence</text>

  <!-- INTER.act (RIGHT) -->
  <text x="735" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#111111">INTER.act</text>
  <line x1="510" y1="40" x2="960" y2="40" stroke="#cccccc" stroke-width="0.5"/>

  <!-- Main brain -->
  <rect x="605" y="48" width="260" height="60" rx="10" fill="#0f5c4a" stroke="#1a9e7e" stroke-width="0.8"/>
  <text x="735" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#9be8d0" dominant-baseline="central">Observer</text>
  <text x="735" y="88" text-anchor="middle" font-size="11" fill="#6fcfb5" dominant-baseline="central">emergent orchestrator · sets goal · observes</text>

  <!-- ONE-WAY arrows: main brain → each actor (6 total). Centers: 552 626 700 774 848 922 -->
  <line x1="630" y1="108" x2="541" y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="665" y1="108" x2="619" y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="706" y1="108" x2="697" y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="752" y1="108" x2="775" y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="795" y1="108" x2="863" y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="830" y1="108" x2="941" y2="132" stroke="#888" stroke-width="0.7" marker-end="url(#arr)"/>

  <!-- ALL 6 ACTORS — box width 62 (16px gap between arms, 26px arm/asset separator)
       Centers: 541, 619, 697, 775 | 26px gap | 863, 941 -->

  <!-- Arm 1: x=510 -->
  <rect x="510" y="132" width="62" height="52" rx="9" fill="#231f6e" stroke="#5b52cc" stroke-width="0.8"/>
  <text x="541" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" dominant-baseline="central">Brain 1</text>
  <text x="541" y="170" text-anchor="middle" font-size="10" fill="#9b96ef" dominant-baseline="central">Arm 1</text>

  <!-- Arm 2: x=588 -->
  <rect x="588" y="132" width="62" height="52" rx="9" fill="#231f6e" stroke="#5b52cc" stroke-width="0.8"/>
  <text x="619" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" dominant-baseline="central">Brain 2</text>
  <text x="619" y="170" text-anchor="middle" font-size="10" fill="#9b96ef" dominant-baseline="central">Arm 2</text>

  <!-- Arm 3: x=666 -->
  <rect x="666" y="132" width="62" height="52" rx="9" fill="#231f6e" stroke="#5b52cc" stroke-width="0.8"/>
  <text x="697" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" dominant-baseline="central">Brain 3</text>
  <text x="697" y="170" text-anchor="middle" font-size="10" fill="#9b96ef" dominant-baseline="central">Arm 3</text>

  <!-- Arm 4: x=744 -->
  <rect x="744" y="132" width="62" height="52" rx="9" fill="#231f6e" stroke="#5b52cc" stroke-width="0.8"/>
  <text x="775" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" dominant-baseline="central">Brain 4</text>
  <text x="775" y="170" text-anchor="middle" font-size="10" fill="#9b96ef" dominant-baseline="central">Arm 4</text>

  <!-- Shuttle A: x=832 — 26px gap after Arm 4 (806 to 832) -->
  <rect x="832" y="132" width="62" height="52" rx="9" fill="#3f2800" stroke="#c49a3c" stroke-width="0.8"/>
  <text x="863" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" dominant-baseline="central">Brain 5</text>
  <text x="863" y="170" text-anchor="middle" font-size="10" fill="#f0c060" dominant-baseline="central">Shuttle A</text>

  <!-- Belt 1: x=910 -->
  <rect x="910" y="132" width="62" height="52" rx="9" fill="#3f2800" stroke="#c49a3c" stroke-width="0.8"/>
  <text x="941" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" dominant-baseline="central">Brain 6</text>
  <text x="941" y="170" text-anchor="middle" font-size="10" fill="#f0c060" dominant-baseline="central">Belt 1</text>

  <!-- PEER arrows — real visible gaps -->
  <!-- 1↔2: 572→588 (16px) -->
  <line x1="572" y1="158" x2="588" y2="158" stroke="#888" stroke-width="0.8" stroke-dasharray="3 2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <!-- 2↔3: 650→666 -->
  <line x1="650" y1="158" x2="666" y2="158" stroke="#888" stroke-width="0.8" stroke-dasharray="3 2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <!-- 3↔4: 728→744 -->
  <line x1="728" y1="158" x2="744" y2="158" stroke="#888" stroke-width="0.8" stroke-dasharray="3 2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <!-- 4↔Shuttle: 806→832 (26px — arm/asset gap, clearly visible) -->
  <line x1="806" y1="158" x2="832" y2="158" stroke="#888" stroke-width="1.0" stroke-dasharray="4 3" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <!-- Shuttle↔Belt: 894→910 -->
  <line x1="894" y1="158" x2="910" y2="158" stroke="#888" stroke-width="0.8" stroke-dasharray="3 2" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- Type labels -->
  <text x="658" y="198" text-anchor="middle" font-size="10" fill="#9b96ef" font-style="italic">arms</text>
  <text x="902" y="198" text-anchor="middle" font-size="10" fill="#8a6300" font-style="italic">assets (vehicle · conveyor)</text>

  <!-- Caption -->
  <text x="735" y="218" text-anchor="middle" font-size="11" fill="#111111">all actors communicate directly - no routing through main brain</text>

  <!-- Summary box — y=234 matching left side, white text -->
  <rect x="502" y="234" width="458" height="104" rx="8" fill="none" stroke="#aaaaaa" stroke-width="0.8"/>
  <text x="731" y="262" text-anchor="middle" font-size="12" fill="#111111">Every actor (arm, shuttle, belt) reasons independently</text>
  <text x="731" y="282" text-anchor="middle" font-size="12" fill="#111111">Any actor can negotiate directly with any other</text>
  <text x="731" y="302" text-anchor="middle" font-size="12" fill="#111111">Chains self-assemble through peer requests</text>
  <text x="731" y="322" text-anchor="middle" font-size="12" fill="#111111">Observer sets goal, steps in only if stuck</text>
</svg>
