<svg width="1060" viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg" style="background:#0d0d0d;font-family:sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="490" y1="14" x2="490" y2="492" stroke="#3a3a3a" stroke-width="0.6"/>

  <!-- TODAY (LEFT) -->
  <text x="245" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">Today</text>
  <line x1="20" y1="40" x2="470" y2="40" stroke="#2a2a2a" stroke-width="0.5"/>

  <rect x="145" y="50" width="200" height="48" rx="10" fill="#8B3A2A" stroke="#c0614a" stroke-width="0.8"/>
  <text x="245" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#f4c8bc" dominant-baseline="central">1 central brain</text>

  <line x1="245" y1="98" x2="100"  y2="120" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="245" y1="98" x2="190"  y2="120" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="245" y1="98" x2="300"  y2="120" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="245" y1="98" x2="390"  y2="120" stroke="#555" stroke-width="0.7" marker-end="url(#arr)"/>

  <rect x="65"  y="120" width="70" height="42" rx="8" fill="#242424" stroke="#484848" stroke-width="0.5"/>
  <text x="100" y="141" text-anchor="middle" font-size="12" fill="#888" dominant-baseline="central">Arm 1</text>
  <rect x="155" y="120" width="70" height="42" rx="8" fill="#242424" stroke="#484848" stroke-width="0.5"/>
  <text x="190" y="141" text-anchor="middle" font-size="12" fill="#888" dominant-baseline="central">Arm 2</text>
  <rect x="265" y="120" width="70" height="42" rx="8" fill="#242424" stroke="#484848" stroke-width="0.5"/>
  <text x="300" y="141" text-anchor="middle" font-size="12" fill="#888" dominant-baseline="central">Arm 3</text>
  <rect x="355" y="120" width="70" height="42" rx="8" fill="#242424" stroke="#484848" stroke-width="0.5"/>
  <text x="390" y="141" text-anchor="middle" font-size="12" fill="#888" dominant-baseline="central">Arm 4</text>

  <text x="245" y="180" text-anchor="middle" font-size="12" fill="#555">arms have no intelligence</text>
  <text x="245" y="197" text-anchor="middle" font-size="12" fill="#555">arms cannot talk to each other</text>
  <text x="245" y="214" text-anchor="middle" font-size="12" fill="#555">assets treated as dumb peripherals</text>

  <rect x="22" y="298" width="446" height="172" rx="8" fill="none" stroke="#2c2c2c" stroke-width="0.8"/>
  <text x="245" y="326" text-anchor="middle" font-size="12" fill="#777">All decisions bottleneck through</text>
  <text x="245" y="346" text-anchor="middle" font-size="12" fill="#777">one central brain</text>
  <text x="245" y="366" text-anchor="middle" font-size="12" fill="#777">Arms cannot communicate</text>
  <text x="245" y="386" text-anchor="middle" font-size="12" fill="#777">No arm can act without instruction</text>
  <text x="245" y="406" text-anchor="middle" font-size="12" fill="#777">Assets have no dedicated intelligence</text>

  <!-- INTER.act (RIGHT) -->
  <text x="735" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">INTER.act</text>
  <line x1="510" y1="40" x2="960" y2="40" stroke="#2a2a2a" stroke-width="0.5"/>

  <rect x="605" y="48" width="260" height="60" rx="10" fill="#0f5c4a" stroke="#1a9e7e" stroke-width="0.8"/>
  <text x="735" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#9be8d0" dominant-baseline="central">Main brain</text>
  <text x="735" y="88" text-anchor="middle" font-size="11" fill="#6fcfb5" dominant-baseline="central">gives task · observes · intervenes</text>

  <!-- Main brain bidir to arm brains -->
  <line x1="634" y1="108" x2="606" y2="132" stroke="#888" stroke-width="0.7" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="700" y1="108" x2="696" y2="132" stroke="#888" stroke-width="0.7" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="770" y1="108" x2="776" y2="132" stroke="#888" stroke-width="0.7" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="836" y1="108" x2="864" y2="132" stroke="#888" stroke-width="0.7" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- 4 Arm brains -->
  <rect x="570" y="132" width="72" height="52" rx="9" fill="#231f6e" stroke="#5b52cc" stroke-width="0.8"/>
  <text x="606" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#cac6f8" dominant-baseline="central">Brain 1</text>
  <text x="606" y="170" text-anchor="middle" font-size="10" fill="#9b96ef" dominant-baseline="central">Arm 1</text>

  <rect x="658" y="132" width="72" height="52" rx="9" fill="#231f6e" stroke="#5b52cc" stroke-width="0.8"/>
  <text x="694" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#cac6f8" dominant-baseline="central">Brain 2</text>
  <text x="694" y="170" text-anchor="middle" font-size="10" fill="#9b96ef" dominant-baseline="central">Arm 2</text>

  <rect x="746" y="132" width="72" height="52" rx="9" fill="#231f6e" stroke="#5b52cc" stroke-width="0.8"/>
  <text x="782" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#cac6f8" dominant-baseline="central">Brain 3</text>
  <text x="782" y="170" text-anchor="middle" font-size="10" fill="#9b96ef" dominant-baseline="central">Arm 3</text>

  <rect x="834" y="132" width="72" height="52" rx="9" fill="#231f6e" stroke="#5b52cc" stroke-width="0.8"/>
  <text x="870" y="151" text-anchor="middle" font-size="12" font-weight="600" fill="#cac6f8" dominant-baseline="central">Brain 4</text>
  <text x="870" y="170" text-anchor="middle" font-size="10" fill="#9b96ef" dominant-baseline="central">Arm 4</text>

  <!-- Dashed arm brain ↔ arm brain -->
  <line x1="643" y1="158" x2="657" y2="158" stroke="#555" stroke-width="0.8" stroke-dasharray="3 2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="731" y1="158" x2="745" y2="158" stroke="#555" stroke-width="0.8" stroke-dasharray="3 2" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="819" y1="158" x2="833" y2="158" stroke="#555" stroke-width="0.8" stroke-dasharray="3 2" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- Main brain → asset brains (thin dashed through arm-brain gaps) -->
  <!-- Brain2–Brain3 gap center ~x=700 → Shuttle A center ~x=683 -->
  <path d="M700,108 L700,184 L683,222" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arr)"/>
  <!-- Brain3–Brain4 gap center ~x=768 → Belt 1 center ~x=793 -->
  <path d="M768,108 L768,184 L793,222" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arr)"/>

  <!-- Asset brains (amber — NEW) -->
  <rect x="638" y="222" width="90" height="52" rx="9" fill="#3f2800" stroke="#c47f10" stroke-width="0.8"/>
  <text x="683" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#f5c97a" dominant-baseline="central">Shuttle A</text>
  <text x="683" y="261" text-anchor="middle" font-size="10" fill="#c47f10" dominant-baseline="central">vehicle</text>

  <rect x="748" y="222" width="90" height="52" rx="9" fill="#3f2800" stroke="#c47f10" stroke-width="0.8"/>
  <text x="793" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#f5c97a" dominant-baseline="central">Belt 1</text>
  <text x="793" y="261" text-anchor="middle" font-size="10" fill="#c47f10" dominant-baseline="central">conveyor</text>

  <!-- Asset brain ↔ asset brain dashed -->
  <line x1="729" y1="248" x2="747" y2="248" stroke="#555" stroke-width="0.8" stroke-dasharray="3 2" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <text x="735" y="292" text-anchor="middle" font-size="12" fill="#444">all brains connected simultaneously</text>

  <!-- Curved dashed arrows -->
  <path d="M575,298 Q735,316 895,298" fill="none" stroke="#333" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <path d="M895,291 Q735,309 575,291" fill="none" stroke="#333" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arr)"/>

  <!-- Right summary box -->
  <rect x="502" y="308" width="458" height="172" rx="8" fill="none" stroke="#2c2c2c" stroke-width="0.8"/>
  <text x="731" y="336" text-anchor="middle" font-size="12" fill="#777">Each arm reasons independently</text>
  <text x="731" y="356" text-anchor="middle" font-size="12" fill="#c47f10">Each asset reasons independently</text>
  <text x="731" y="376" text-anchor="middle" font-size="12" fill="#777">Arms &amp; assets negotiate with each other</text>
  <text x="731" y="396" text-anchor="middle" font-size="12" fill="#777">Main brain sets goal, stays informed</text>
  <text x="731" y="416" text-anchor="middle" font-size="12" fill="#777">Main brain steps in only if stuck</text>
</svg>
